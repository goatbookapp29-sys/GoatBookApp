<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoatBook Simulator</title>
    <style>
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        .simulator-container {
            position: relative;
            width: 380px;
            height: 800px;
        }

        /* Phone Frame */
        .phone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            border-radius: 50px;
            box-shadow: 0 0 0 10px #222, 0 0 0 12px #333, 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #444;
        }

        /* Screen Wrapper */
        .screen {
            flex: 1;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            margin: 5px;
        }

        /* Iframe for the app */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* Phone Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #111;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* Controls */
        .controls {
            position: absolute;
            left: -150px;
            top: 50%;
            transform: translateY(-50%);
            width: 120px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: #FF5A0F;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        .info {
            position: absolute;
            right: -250px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
        }

        h2 { margin: 0 0 10px 0; color: #FF5A0F; }
        p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" onclick="reloadFrame()">🔄 Refresh</button>
        <button class="btn" onclick="togglePlatform('ios')">🍎 iOS Mode</button>
        <button class="btn" onclick="togglePlatform('android')">🤖 Android</button>
    </div>

    <div class="simulator-container">
        <div class="phone" id="phoneBody">
            <div class="notch"></div>
            <div class="screen">
                <iframe id="appFrame" src="http://localhost:8084"></iframe>
            </div>
        </div>
    </div>

    <div class="info">
        <h2>GoatBook Pro Tester</h2>
        <p>This is a custom web-based simulator. It runs the real mobile code inside a phone shell.</p>
        <p><b>Note:</b> Ensure your Expo server is running in the background!</p>
    </div>

    <script>
        const frame = document.getElementById('appFrame');
        const phone = document.getElementById('phoneBody');

        function reloadFrame() {
            frame.src = frame.src;
        }

        function togglePlatform(type) {
            if (type === 'android') {
                phone.style.borderRadius = "20px";
                document.querySelector('.notch').style.display = 'none';
            } else {
                phone.style.borderRadius = "50px";
                document.querySelector('.notch').style.display = 'block';
            }
            reloadFrame();
        }
    </script>
</body>
</html>
